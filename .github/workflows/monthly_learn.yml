name: monthly-learn

on:
  schedule:
    - cron: "0 1 * * 6"   # 毎週土曜 10:00 JST に起動。月内最初の土曜以外はスクリプト側でスキップ
  workflow_dispatch:
    inputs:
      force:
        description: "月初以外でも強制実行する場合は true"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  learn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run monthly learning job
        env:
          FORCE_RUN: ${{ github.event.inputs.force == 'true' && '1' || '0' }}
        run: python jobs/run_learn.py

      - name: Build dashboard data
        run: python dashboard/build.py

      - name: Commit state & dashboard
        run: |
          git config user.name "kabu-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/ docs/data.json
          git diff --cached --quiet || git commit -m "monthly: $(date -u +%Y-%m-%d) learning update"
          git push
