name: daily-trade

on:
  schedule:
    - cron: "50 6 * * 1-5"   # 平日 15:50 JST (大引け後)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run daily trading job
        run: python jobs/run_daily.py

      - name: Build dashboard data
        run: python dashboard/build.py

      - name: Commit state & dashboard
        run: |
          git config user.name "kabu-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/ docs/data.json
          git diff --cached --quiet || git commit -m "daily: $(date -u +%Y-%m-%d) trade update"
          git push
